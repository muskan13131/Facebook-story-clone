<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook clone</title>

    <link rel="shortcut icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Facebook_Logo_2023.png/1200px-Facebook_Logo_2023.png">
    <link rel="stylesheet" href="style.css" />


    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <!-- navbar -->
    <div class="navbar">
      <div class="nav-left">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Facebook_Logo_2023.png/1200px-Facebook_Logo_2023.png"
          alt=""
          class="logo"
        />
        <input type="text" class="search-bar" placeholder="Search Facebook" />
      </div>

      <div class="nav-center">
        <span class="material-symbols-outlined nav-icon"> home </span>
        <span class="material-symbols-outlined nav-icon"> live_tv </span>
        <span class="material-symbols-outlined nav-icon"> storefront </span>
        <span class="material-symbols-outlined nav-icon"> groups </span>
        <span class="material-symbols-outlined nav-icon"> explore </span>
      </div>

      <div class="nav-right">
        <span class="material-symbols-outlined circle-icon"> add </span>
        <span class="material-symbols-outlined circle-icon">
          notifications
        </span>
        <span class="material-symbols-outlined circle-icon"> chat </span>
        <img src="https://cdn.pixabay.com/photo/2025/02/13/09/00/girl-9403330_1280.jpg" alt="profile" class="profile-pic" />
      </div>
    </div>

    <!-- story section -->
     <div class="stiry-section">
        <div class="story-container">

            <div class="story">
                <img src="https://cdn.pixabay.com/photo/2024/01/08/19/33/bridge-8496195_1280.jpg" alt="Story" class="story-main-img">
                <img src="https://cdn.pixabay.com/photo/2025/02/13/09/00/girl-9403330_1280.jpg" alt="profile" class="story-profile">
                <p class="story-user">Your Story</p>
            
            </div>

            <div class="story">
                <img src="https://cdn.pixabay.com/photo/2025/07/26/03/16/butterfly-9735952_1280.jpg" alt="Story" class="story-main-img">
                <img src="https://cdn.pixabay.com/photo/2023/10/19/23/40/wallpaper-8327848_1280.jpg" alt="profile" class="story-profile">
                <p class="story-user">Bnnique</p>
            
            </div>

            <div class="story">
                <img src="https://cdn.pixabay.com/photo/2025/07/14/16/59/kananaskis-9714444_1280.jpg" alt="Story" class="story-main-img">
                <img src="https://cdn.pixabay.com/photo/2023/04/21/15/42/portrait-7942151_1280.jpg" alt="profile" class="story-profile">
                <p class="story-user">AveCalvar</p>
            
            </div>

            <div class="story">
                <img src="https://cdn.pixabay.com/photo/2024/12/29/09/14/glitter-9297612_1280.jpg" alt="Story" class="story-main-img">
                <img src="https://cdn.pixabay.com/photo/2024/04/04/11/29/woman-8674934_1280.png" alt="profile" class="story-profile">
                <p class="story-user">Chuotanhls</p>
            
            </div>

            <div class="story">
                <img src="https://cdn.pixabay.com/photo/2022/09/05/17/15/vancouver-7434702_1280.jpg" alt="Story" class="story-main-img">
                <img src="https://cdn.pixabay.com/photo/2019/09/04/13/48/team-4451672_1280.jpg" alt="profile" class="story-profile">
                <p class="story-user">Tyna_lanoch</p>
            
            </div>
        
        
        </div>
     </div>
  </body>
</html>
